<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="VocalMix">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#07131a">
  <meta name="theme-color" content="#07131a" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#07131a" media="(prefers-color-scheme: dark)">
  <title>VocalMix</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-logo">VocalMix</div>
    <div class="login-sub">Tap your mic slot to open its live mix</div>
    <div class="login-grid" id="loginGrid"></div>
  </div>

  <div class="mixer-screen" id="mixerScreen">
    <div class="mixer-top">
      <div class="mixer-user">
        <div class="mixer-avatar" id="mixerAvatar">1</div>
        <div>
          <div class="mixer-name" id="mixerName">Mic 1</div>
          <div class="mixer-aux" id="mixerAux">Aux 1</div>
          <div class="mixer-loaded" id="loadedMixLabel">Live mix only</div>
        </div>
      </div>
      <div class="mixer-stats" id="mixerStats">0 channels</div>
      <button class="btn-logout" type="button" data-action="logout">Switch User</button>
    </div>

    <div class="mixer-hint" id="mixerHint">Stage deck ready</div>
    <div class="fader-area" id="faderArea"></div>

    <div class="preset-bar">
      <button class="preset-btn" type="button" data-action="open-recall-modal">Recall Mix</button>
      <button class="preset-btn" type="button" data-action="all-faders-unity">0 dB</button>
      <button class="preset-btn" type="button" data-action="create-mix">+ New Mix</button>
      <button class="preset-btn save-btn" type="button" data-action="save-mix">✓ Save Mix</button>
    </div>
  </div>

  <div class="mix-modal" id="mixModal">
    <div class="mix-sheet">
      <div class="mix-sheet-header">
        <div>
          <div class="mix-sheet-title">Recall Mix</div>
          <div class="mix-sheet-sub">Choose a saved mix to apply to this mic slot</div>
        </div>
        <button class="mix-close" type="button" data-action="close-recall-modal">✕</button>
      </div>
      <div class="mix-list" id="mixList"></div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
